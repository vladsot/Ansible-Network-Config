---
- name: Configure network safely
  hosts: localhost
  become: yes
  connection: local

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    backup_dir: "/tmp/net_backup_{{ ansible_date_time.epoch }}"
    rollback_script: "/tmp/net_rollback.sh"
    rollback_tag: "net_rollback_job"
    apply_delay: 15
    log_file: "/var/log/network_config_{{ ansible_date_time.epoch }}.log"
    ssh_repo: "https://github.com/vladsot/ssh.git"
    ssh_tmp_dir: "/tmp/ssh_keys_repo"

  tasks:

    - name: Show log file
      debug:
        msg: "Logging to {{ log_file }}"

    - name: Start log
      shell: "echo '=== START $(date) ===' >> {{ log_file }}"

    # =========================
    # OS DETECTION
    # =========================
    - name: Detect OS
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"

    # =========================
    # APT CLEANUP + DEDUP
    # =========================
    - name: Find APT files
      when: is_debian
      find:
        paths: /etc/apt
        recurse: yes
        patterns:
          - "*.list"
          - "*.sources"
      register: apt_files

    - name: Split list and sources
      when: is_debian
      set_fact:
        apt_list_files: "{{ apt_files.files | selectattr('path','search','\\.list$') | list }}"
        apt_sources_files: "{{ apt_files.files | selectattr('path','search','\\.sources$') | list }}"

    - name: Extract URLs from .sources
      when: is_debian
      shell: "awk '/^URIs:/ {for(i=2;i<=NF;i++) print $i}' {{ item.path }}"
      register: sources_urls
      loop: "{{ apt_sources_files }}"
      changed_when: false

    - name: Build sources URL list
      when: is_debian
      set_fact:
        sources_url_list: "{{ sources_urls.results | map(attribute='stdout_lines') | list | flatten }}"

    - name: Disable duplicate .list repos
      when: is_debian
      shell: |
        FILE="{{ item.path }}"
        MATCH=0
        while read -r line; do
          if [[ "$line" =~ ^deb ]]; then
            url=$(echo "$line" | awk '{print $2}')
            for s in {{ sources_url_list | join(' ') }}; do
              [[ "$url" == "$s" ]] && MATCH=1
            done
          fi
        done < "$FILE"
        if [ "$MATCH" -eq 1 ]; then
          mv "$FILE" "$FILE.disabled"
        fi
      args:
        executable: /bin/bash
      loop: "{{ apt_list_files }}"
      failed_when: false

    - name: Clean malformed/duplicate lines
      when: is_debian
      shell: |
        FILE="{{ item.path }}"
        TMP="$(mktemp)"
        awk '
          /^[[:space:]]*#/ { print; next }
          /^[[:space:]]*$/ { print; next }
          /^[[:space:]]*deb(-src)?[[:space:]]+/ { print; next }
        ' "$FILE" > "$TMP.clean"

        awk '
          /^[[:space:]]*deb(-src)?[[:space:]]+/ {
            if (!seen[$0]++) print
            next
          }
          { print }
        ' "$TMP.clean" > "$TMP"

        if ! cmp -s "$TMP" "$FILE"; then
          cp "$FILE" "$FILE.bak"
          mv "$TMP" "$FILE"
        fi

        rm -f "$TMP.clean"
      args:
        executable: /bin/bash
      loop: "{{ apt_list_files }}"
      failed_when: false

    # =========================
    # PACKAGE INSTALL
    # =========================
    - name: Fix apt
      when: is_debian
      shell: |
        dpkg --configure -a || true
        apt-get clean || true
        rm -rf /var/lib/apt/lists/* || true

    - name: Update apt cache
      when: is_debian
      apt:
        update_cache: yes
      retries: 5
      delay: 5

    - name: Install packages (Debian)
      when: is_debian
      apt:
        name:
          - rsync
          - iputils-arping
          - vim
          - git
        state: present

    - name: Install packages (RHEL)
      when: is_redhat
      dnf:
        name:
          - rsync
          - arping
          - vim
          - git
        state: present

    # =========================
    # SSH SETUP
    # =========================
    - name: Clone SSH repo
      git:
        repo: "{{ ssh_repo }}"
        dest: "{{ ssh_tmp_dir }}"
        update: yes

    - name: Ensure .ssh
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Install keys
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', item) }}"
      loop: "{{ lookup('fileglob', ssh_tmp_dir + '/*.pub', wantlist=True) }}"

    - name: Verify keys exist
      stat:
        path: /root/.ssh/authorized_keys
      register: ssh_keys

    - name: Abort if no keys
      fail:
        msg: "No SSH keys → aborting"
      when: ssh_keys.stat.size == 0

    # =========================
    # SSH HARDENING
    # =========================
    - name: Set PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'

    - name: Handle AllowUsers
      shell: "grep '^AllowUsers' /etc/ssh/sshd_config"
      register: allowusers
      ignore_errors: yes
      changed_when: false

    - name: Append root to AllowUsers
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: "{{ allowusers.stdout }} root"
      when: allowusers.rc == 0 and ('root' not in allowusers.stdout)

    - name: Restart SSH
      service:
        name: "{{ 'ssh' if is_debian else 'sshd' }}"
        state: restarted

    # =========================
    # CLOUD-INIT
    # =========================
    - name: Disable cloud-init network
      copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: "network: {config: disabled}"
      failed_when: false

    - name: Remove cloud-init netplan
      when: is_debian
      file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent

    # =========================
    # BACKUP + NETWORK CONFIG
    # =========================
    - name: Ensure backup directory (Debian)
      when: is_debian
      file:
        path: "{{ backup_dir }}/netplan"
        state: directory

    - name: Ensure backup directory (RHEL)
      when: is_redhat
      file:
        path: "{{ backup_dir }}/nm-connections"
        state: directory

    - name: Backup netplan
      when: is_debian
      command: rsync -a /etc/netplan/ {{ backup_dir }}/netplan/

    - name: Backup NM connections (RHEL)
      when: is_redhat
      shell: rsync -a /etc/NetworkManager/system-connections/ {{ backup_dir }}/nm-connections/
      failed_when: false

    - name: Write netplan config
      when: is_debian
      copy:
        dest: /etc/netplan/99-custom.yaml
        backup: yes
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ interface }}:
                dhcp4: no
                addresses:
                  - {{ ip_address }}/{{ subnet_mask }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: {{ dns_servers }}
      register: netplan_result

    - name: Configure network via NetworkManager (RHEL)
      when: is_redhat
      shell: |
        CON=$(nmcli -g GENERAL.CONNECTION device show {{ interface }} 2>/dev/null | head -1)
        if [ -z "$CON" ] || [ "$CON" = "--" ]; then
          nmcli connection add type ethernet ifname {{ interface }} con-name {{ interface }} \
            ipv4.method manual \
            ipv4.addresses {{ ip_address }}/{{ subnet_mask }} \
            ipv4.gateway {{ gateway }} \
            ipv4.dns "{{ dns_servers | join(' ') }}" \
            connection.autoconnect yes
        else
          nmcli connection modify "$CON" \
            ipv4.method manual \
            ipv4.addresses {{ ip_address }}/{{ subnet_mask }} \
            ipv4.gateway {{ gateway }} \
            ipv4.dns "{{ dns_servers | join(' ') }}" \
            connection.autoconnect yes
        fi
      args:
        executable: /bin/bash
      register: nm_result

    - name: Set network_changed (Debian)
      when: is_debian
      set_fact:
        network_changed: "{{ netplan_result.changed }}"

    - name: Set network_changed (RHEL)
      when: is_redhat
      set_fact:
        network_changed: "{{ nm_result.rc == 0 }}"

    # =========================
    # ROLLBACK
    # =========================
    - name: Kill previous rollback jobs
      shell: "pkill -f '{{ rollback_tag }}' || true"
      failed_when: false

    - name: Create rollback script (Debian)
      when: is_debian
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          rsync -a {{ backup_dir }}/netplan/ /etc/netplan/
          netplan apply

    - name: Create rollback script (RHEL)
      when: is_redhat
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          rsync -a {{ backup_dir }}/nm-connections/ /etc/NetworkManager/system-connections/
          nmcli connection reload
          nmcli connection up {{ interface }}

    - name: Schedule rollback
      when: network_changed
      shell: "nohup bash -c 'sleep 120 && {{ rollback_script }} #{{ rollback_tag }}' >/dev/null 2>&1 &"

    - name: Apply netplan
      when: is_debian and network_changed
      command: netplan apply

    - name: Apply network config (RHEL)
      when: is_redhat and network_changed
      shell: |
        nmcli connection reload
        nmcli connection up {{ interface }}
      args:
        executable: /bin/bash

    - name: ARP check
      when: network_changed
      shell: "arping -c 3 -I {{ interface }} {{ gateway }}"
      register: arp_result
      retries: 3
      delay: 3
      until: arp_result.rc == 0

    - name: Cancel rollback
      when: network_changed and arp_result.rc == 0
      shell: "pkill -f '{{ rollback_tag }}'"
      failed_when: false

    - name: Fail if unreachable
      fail:
        msg: "Gateway unreachable → rollback will execute"
      when: network_changed and arp_result.rc != 0

    - name: Log success
      shell: "echo 'SUCCESS $(date)' >> {{ log_file }}"
