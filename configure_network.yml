---
- name: Configure network safely
  hosts: localhost
  become: yes
  connection: local

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    backup_dir: "/tmp/net_backup_{{ ansible_date_time.epoch }}"
    rollback_script: "/tmp/net_rollback.sh"
    apply_delay: 15

  tasks:

    # =========================
    # OS DETECTION
    # =========================
    - name: Detect OS family
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"

    # =========================
    # VALIDATION
    # =========================
    - name: Validate IPv4 format
      assert:
        that:
          - ip_address is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - gateway is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - subnet_mask | int >= 0
          - subnet_mask | int <= 32
          - dns_servers | length > 0

    - name: Validate each DNS entry
      assert:
        that: item is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
      loop: "{{ dns_servers }}"

    # =========================
    # BACKUP (MULTI-FILE SAFE)
    # =========================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Backup netplan directory
      when: is_debian
      synchronize:
        src: /etc/netplan/
        dest: "{{ backup_dir }}/netplan/"
        recursive: yes
      delegate_to: localhost

    - name: Backup RHEL configs
      when: is_redhat
      synchronize:
        src: /etc/sysconfig/network-scripts/
        dest: "{{ backup_dir }}/network-scripts/"
        recursive: yes
      delegate_to: localhost

    # =========================
    # ROLLBACK SCRIPT
    # =========================
    - name: Create rollback script
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          echo "ROLLBACK TRIGGERED"

          if [ -d "{{ backup_dir }}/netplan" ]; then
            rm -rf /etc/netplan/*
            cp -r {{ backup_dir }}/netplan/* /etc/netplan/
            netplan apply
          fi

          if [ -d "{{ backup_dir }}/network-scripts" ]; then
            rm -rf /etc/sysconfig/network-scripts/*
            cp -r {{ backup_dir }}/network-scripts/* /etc/sysconfig/network-scripts/
            systemctl restart network || systemctl restart NetworkManager
          fi

    # =========================
    # SCHEDULE ROLLBACK
    # =========================
    - name: Schedule rollback in 2 minutes
      shell: "nohup bash -c 'sleep 120 && {{ rollback_script }}' >/dev/null 2>&1 &"

    # =========================
    # WARNING DELAY
    # =========================
    - name: Warning before applying
      pause:
        seconds: "{{ apply_delay }}"
        prompt: |
          Network will change in {{ apply_delay }} seconds.
          CTRL+C to abort.

    # =========================
    # APPLY (DEBIAN)
    # =========================
    - name: Apply netplan config
      when: is_debian
      copy:
        dest: /etc/netplan/99-custom.yaml
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ interface }}:
                dhcp4: no
                addresses:
                  - {{ ip_address }}/{{ subnet_mask }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: {{ dns_servers }}

    - name: Apply netplan
      when: is_debian
      command: netplan apply

    # =========================
    # APPLY (RHEL)
    # =========================
    - name: Configure RHEL network
      when: is_redhat
      copy:
        dest: "/etc/sysconfig/network-scripts/ifcfg-{{ interface }}"
        content: |
          DEVICE={{ interface }}
          BOOTPROTO=none
          ONBOOT=yes
          IPADDR={{ ip_address }}
          PREFIX={{ subnet_mask }}
          GATEWAY={{ gateway }}
          DNS1={{ dns_servers[0] }}
          DNS2={{ dns_servers[1] | default('') }}

    - name: Restart network
      when: is_redhat
      command: systemctl restart network || systemctl restart NetworkManager

    # =========================
    # CONNECTIVITY CHECK (ARP)
    # =========================
    - name: Wait for SSH to stabilize
      wait_for:
        port: 22
        timeout: 60

    - name: Check if arping is available
      command: which arping
      register: arping_check
      ignore_errors: yes
      changed_when: false

    - name: Fail if arping is not installed
      fail:
        msg: "arping is required for gateway validation but not installed."
      when: arping_check.rc != 0

    - name: ARP check to gateway
      shell: "arping -c 3 -I {{ interface }} {{ gateway }}"
      register: arp_result
      retries: 3
      delay: 3
      until: arp_result.rc == 0

    # =========================
    # CANCEL ROLLBACK ONLY IF SAFE
    # =========================
    - name: Cancel rollback
      shell: "pkill -f '{{ rollback_script }}' || true"
      when: arp_result.rc == 0

    - name: Fail if gateway unreachable (rollback will execute)
      fail:
        msg: "Gateway not reachable via ARP. Rollback will proceed."
      when: arp_result.rc != 0

    - name: Success message
      debug:
        msg: "Network configured and verified (ARP OK). Rollback canceled."
      when: arp_result.rc == 0