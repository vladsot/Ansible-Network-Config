---
- name: Configure network safely (idempotent)
  hosts: localhost
  become: yes
  connection: local

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    backup_dir: "/tmp/net_backup_{{ ansible_date_time.epoch }}"
    rollback_script: "/tmp/net_rollback.sh"
    rollback_tag: "net_rollback_job"
    apply_delay: 15
    log_file: "/var/log/network_config_{{ ansible_date_time.epoch }}.log"
    ssh_repo: "https://github.com/vladsot/ssh.git"
    ssh_tmp_dir: "/tmp/ssh_keys_repo"

  tasks:

    - name: Show log file location
      debug:
        msg: "Logging to {{ log_file }}"

    - name: Start log
      shell: "echo '=== START $(date) ===' >> {{ log_file }}"

    # =========================
    # OS DETECTION
    # =========================
    - name: Detect OS family
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"

    # =========================
    # APT REPO CLEANUP (NEW)
    # =========================
    - name: Find APT repo files
      when: is_debian
      find:
        paths: /etc/apt
        patterns: "*.list"
        recurse: yes
      register: apt_list_files

    - name: Clean and deduplicate APT repo definitions
      when: is_debian
      shell: |
        set -e
        FILE="{{ item.path }}"
        TMP="$(mktemp)"

        awk '
          /^[[:space:]]*#/ { print; next }
          /^[[:space:]]*$/ { print; next }
          /^[[:space:]]*deb(-src)?[[:space:]]+/ { print; next }
        ' "$FILE" > "$TMP.clean"

        awk '
          /^[[:space:]]*deb(-src)?[[:space:]]+/ {
            if (!seen[$0]++) print
            next
          }
          { print }
        ' "$TMP.clean" > "$TMP"

        if ! cmp -s "$TMP" "$FILE"; then
          cp "$FILE" "$FILE.bak"
          mv "$TMP" "$FILE"
        fi

        rm -f "$TMP.clean" || true
      args:
        executable: /bin/bash
      loop: "{{ apt_list_files.files }}"
      register: repo_cleanup

    - name: Log repo cleanup
      when: is_debian
      shell: "echo 'APT repo cleanup completed' >> {{ log_file }}"

    # =========================
    # PACKAGE INSTALL (RESILIENT)
    # =========================
    - name: Fix apt issues
      when: is_debian
      shell: |
        dpkg --configure -a || true
        apt-get clean || true
        rm -rf /var/lib/apt/lists/* || true

    - name: Update apt cache
      when: is_debian
      apt:
        update_cache: yes
      register: apt_update
      retries: 5
      delay: 5
      until: apt_update is succeeded

    - name: Install packages (Debian)
      when: is_debian
      apt:
        name:
          - rsync
          - iputils-arping
          - vim
          - git
        state: present

    - name: Install packages (RHEL)
      when: is_redhat
      yum:
        name:
          - rsync
          - arping
          - vim
          - git
        state: present

    # =========================
    # SSH KEYS
    # =========================
    - name: Clone SSH repo
      git:
        repo: "{{ ssh_repo }}"
        dest: "{{ ssh_tmp_dir }}"
        update: yes

    - name: Ensure root .ssh exists
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Install SSH keys
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', item) }}"
      loop: "{{ lookup('fileglob', ssh_tmp_dir + '/*.pub', wantlist=True) }}"

    - name: Validate SSH keys exist
      stat:
        path: /root/.ssh/authorized_keys
      register: ssh_keys_file

    - name: Fail if no SSH keys
      fail:
        msg: "No SSH keys found. Aborting to avoid lockout."
      when: ssh_keys_file.stat.size == 0

    # =========================
    # SSH HARDENING
    # =========================
    - name: Set PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'

    - name: Check AllowUsers
      shell: "grep '^AllowUsers' /etc/ssh/sshd_config"
      register: allowusers_check
      ignore_errors: yes
      changed_when: false

    - name: Add root to AllowUsers
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: "{{ allowusers_check.stdout }} root"
      when: allowusers_check.rc == 0 and ('root' not in allowusers_check.stdout)

    - name: Restart SSH
      service:
        name: "{{ 'ssh' if is_debian else 'sshd' }}"
        state: restarted

    # =========================
    # CLOUD-INIT CONTROL
    # =========================
    - name: Disable cloud-init networking
      copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: "network: {config: disabled}"

    - name: Remove cloud-init netplan
      file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent

    # =========================
    # NETPLAN CONFIG
    # =========================
    - name: Backup netplan BEFORE change
      shell: "rsync -a /etc/netplan/ {{ backup_dir }}/netplan/"

    - name: Write netplan config
      copy:
        dest: /etc/netplan/99-custom.yaml
        backup: yes
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ interface }}:
                dhcp4: no
                addresses:
                  - {{ ip_address }}/{{ subnet_mask }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: {{ dns_servers }}
      register: netplan_result

    # =========================
    # ROLLBACK CONTROL
    # =========================
    - name: Kill previous rollback jobs
      shell: "pkill -f '{{ rollback_tag }}' || true"
      failed_when: false

    - name: Create rollback script
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          rsync -a {{ backup_dir }}/netplan/ /etc/netplan/
          netplan apply

    - name: Schedule rollback
      when: netplan_result.changed
      shell: "nohup bash -c 'sleep 120 && {{ rollback_script }} #{{ rollback_tag }}' >/dev/null 2>&1 &"

    - name: Apply netplan
      command: netplan apply
      when: netplan_result.changed

    - name: ARP check
      when: netplan_result.changed
      shell: "arping -c 3 -I {{ interface }} {{ gateway }}"
      register: arp_result
      retries: 3
      delay: 3
      until: arp_result.rc == 0

    - name: Cancel rollback
      when: netplan_result.changed and arp_result.rc == 0
      shell: "pkill -f '{{ rollback_tag }}'"
      failed_when: false

    - name: Fail if unreachable
      fail:
        msg: "Gateway unreachable. Rollback will execute."
      when: netplan_result.changed and arp_result.rc != 0