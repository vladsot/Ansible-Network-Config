---
- name: Configure network safely
  hosts: localhost
  become: yes
  connection: local

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    backup_dir: "/tmp/net_backup_{{ ansible_date_time.epoch }}"
    rollback_script: "/tmp/net_rollback.sh"
    apply_delay: 15
    log_file: "/var/log/network_config_{{ ansible_date_time.epoch }}.log"
    ssh_repo: "https://github.com/vladsot/ssh.git"
    ssh_tmp_dir: "/tmp/ssh_keys_repo"

  tasks:

    - name: Show log file location
      debug:
        msg: "Logging to {{ log_file }}"

    - name: Start log
      shell: "echo '=== START $(date) ===' >> {{ log_file }}"

    # =========================
    # OS DETECTION
    # =========================
    - name: Detect OS family
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"

    # =========================
    # FIX + INSTALL PACKAGES
    # =========================
    - name: Fix apt issues (best-effort)
      when: is_debian
      shell: |
        dpkg --configure -a || true
        apt-get clean || true
        rm -rf /var/lib/apt/lists/* || true

    - name: Update apt cache (retry)
      when: is_debian
      apt:
        update_cache: yes
      register: apt_update
      retries: 5
      delay: 5
      until: apt_update is succeeded

    - name: Install required packages (Debian)
      when: is_debian
      apt:
        name:
          - rsync
          - iputils-arping
          - vim
          - git
        state: present
      register: apt_install
      retries: 3
      delay: 5
      until: apt_install is succeeded

    - name: Install required packages (RHEL)
      when: is_redhat
      yum:
        name:
          - rsync
          - arping
          - vim
          - git
        state: present

    - name: Log package installation
      shell: |
        echo "APT update rc={{ apt_update.rc | default('n/a') }}" >> {{ log_file }}
        echo "APT install rc={{ apt_install.rc | default('n/a') }}" >> {{ log_file }}

    # =========================
    # SSH KEY SETUP (FIXED)
    # =========================
    - name: Clone SSH key repository
      git:
        repo: "{{ ssh_repo }}"
        dest: "{{ ssh_tmp_dir }}"
        force: yes

    - name: Ensure root .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Add SSH keys properly
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', item) }}"
      loop: "{{ lookup('fileglob', ssh_tmp_dir + '/*.pub', wantlist=True) }}"

    - name: Ensure correct permissions
      file:
        path: /root/.ssh/authorized_keys
        mode: '0600'

    - name: Log SSH setup
      shell: "echo 'SSH keys installed' >> {{ log_file }}"

    # =========================
    # SSH HARDENING
    # =========================
    - name: Set PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'

    - name: Check AllowUsers
      shell: "grep '^AllowUsers' /etc/ssh/sshd_config"
      register: allowusers_check
      ignore_errors: yes
      changed_when: false

    - name: Add root to AllowUsers if exists
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: "{{ allowusers_check.stdout }} root"
      when: allowusers_check.rc == 0 and ('root' not in allowusers_check.stdout)

    - name: Restart SSH
      shell: "systemctl restart ssh || systemctl restart sshd"

    # =========================
    # VALIDATION
    # =========================
    - name: Validate IPv4 format
      assert:
        that:
          - ip_address is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - gateway is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - subnet_mask | int >= 0
          - subnet_mask | int <= 32
          - dns_servers | length > 0

    # =========================
    # BACKUP
    # =========================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Backup netplan
      when: is_debian
      shell: "rsync -a /etc/netplan/ {{ backup_dir }}/netplan/ 2>>{{ log_file }} || true"

    - name: Backup RHEL configs
      when: is_redhat
      shell: "rsync -a /etc/sysconfig/network-scripts/ {{ backup_dir }}/network-scripts/ 2>>{{ log_file }} || true"

    # =========================
    # CLOUD-INIT CONTROL (NEW)
    # =========================
    - name: Disable cloud-init network config
      copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: "network: {config: disabled}"

    - name: Remove cloud-init netplan
      file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent

    - name: Log cloud-init changes
      shell: "echo 'cloud-init network disabled' >> {{ log_file }}"

    # =========================
    # ROLLBACK SCRIPT
    # =========================
    - name: Create rollback script
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          echo "ROLLBACK TRIGGERED $(date)" >> {{ log_file }}

          if [ -d "{{ backup_dir }}/netplan" ]; then
            rm -rf /etc/netplan/*
            rsync -a {{ backup_dir }}/netplan/ /etc/netplan/
            netplan apply >> {{ log_file }} 2>&1
          fi

          if [ -d "{{ backup_dir }}/network-scripts" ]; then
            rm -rf /etc/sysconfig/network-scripts/*
            rsync -a {{ backup_dir }}/network-scripts/ /etc/sysconfig/network-scripts/
            systemctl restart network >> {{ log_file }} 2>&1 || systemctl restart NetworkManager >> {{ log_file }} 2>&1
          fi

    # =========================
    # SCHEDULE ROLLBACK
    # =========================
    - name: Schedule rollback
      shell: "nohup bash -c 'sleep 120 && {{ rollback_script }}' >> {{ log_file }} 2>&1 &"

    # =========================
    # DELAY
    # =========================
    - name: Warning before applying
      pause:
        seconds: "{{ apply_delay }}"

    # =========================
    # APPLY NETWORK
    # =========================
    - name: Apply netplan
      when: is_debian
      copy:
        dest: /etc/netplan/99-custom.yaml
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ interface }}:
                dhcp4: no
                addresses:
                  - {{ ip_address }}/{{ subnet_mask }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: {{ dns_servers }}

    - name: Apply netplan command
      when: is_debian
      shell: "netplan apply >> {{ log_file }} 2>&1"

    # =========================
    # VERIFY (ARP)
    # =========================
    - name: ARP check
      shell: "arping -c 3 -I {{ interface }} {{ gateway }} >> {{ log_file }} 2>&1"
      register: arp_result
      retries: 3
      delay: 3
      until: arp_result.rc == 0

    # =========================
    # CANCEL ROLLBACK (FIXED)
    # =========================
    - name: Cancel rollback
      shell: "pkill -f '{{ rollback_script }}' >> {{ log_file }} 2>&1"
      register: pkill_result
      failed_when: false
      changed_when: pkill_result.rc == 0
      when: arp_result.rc == 0

    - name: Log success
      shell: "echo 'SUCCESS $(date)' >> {{ log_file }}"
      when: arp_result.rc == 0

    - name: Fail if unreachable
      fail:
        msg: "Gateway unreachable. Rollback will execute."
      when: arp_result.rc != 0